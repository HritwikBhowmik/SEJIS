services:
  db:
    image: postgres:15-alpine
    container_name: sejis-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sejis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sejis_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpinerocesses out-of-the-box
    container_name: sejis-redis
    command: redis-server --requirepass hacktoredis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "hacktoredis", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: sejis-web
    ports:
      - "6969:6969"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/sejis_db
      - REDIS_URL=redis://:hacktoredis@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
