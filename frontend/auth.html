<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in or create an account on SEJIS to start practicing AI-powered mock interviews.">
  <title>Sign In — SEJIS</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-wrapper">

      <!-- Back Link -->
      <a href="index.html" class="auth-back">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to home
      </a>

      <!-- Branding -->
      <div class="auth-brand">
        <div class="auth-brand-logo">S</div>
        <h2>Welcome to SEJIS</h2>
        <p class="text-muted">Sign in to your account or create a new one</p>
      </div>

      <!-- Auth Card -->
      <div class="auth-card">

        <!-- Tab Switcher -->
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login-panel" id="tab-login">Sign In</button>
          <button class="auth-tab" data-tab="register-panel" id="tab-register">Register</button>
        </div>

        <div class="auth-body">

          <!-- ===== LOGIN PANEL ===== -->
          <div class="auth-panel active" id="login-panel">
            <div class="auth-message" id="login-message"></div>
            <form class="auth-form" id="login-form">
              <div class="form-group">
                <label class="form-label" for="login-email">Email Address</label>
                <input type="email" class="form-input" id="login-email" placeholder="you@example.com" required autocomplete="email">
              </div>
              <div class="form-group">
                <label class="form-label" for="login-password">Password</label>
                <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
              </div>
              <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
          </div>

          <!-- ===== REGISTER PANEL ===== -->
          <div class="auth-panel" id="register-panel">
            <div class="auth-message" id="register-message"></div>
            <form class="auth-form" id="register-form">
              <div class="form-group">
                <label class="form-label" for="register-name">Full Name</label>
                <input type="text" class="form-input" id="register-name" placeholder="John Doe" required minlength="2" autocomplete="name">
              </div>
              <div class="form-group">
                <label class="form-label" for="register-email">Email Address</label>
                <input type="email" class="form-input" id="register-email" placeholder="you@example.com" required autocomplete="email">
              </div>
              <div class="form-group">
                <label class="form-label" for="register-password">Password</label>
                <input type="password" class="form-input" id="register-password" placeholder="Min. 6 characters" required minlength="6" autocomplete="new-password">
                <p class="password-hint">Must be at least 6 characters long</p>
              </div>
              <div class="form-group">
                <label class="form-label" for="register-confirm-password">Confirm Password</label>
                <input type="password" class="form-input" id="register-confirm-password" placeholder="Re-enter your password" required autocomplete="new-password">
              </div>
              <button type="submit" class="btn btn-primary">Create Account</button>
            </form>
          </div>

        </div>

        <!-- Footer -->
        <div class="auth-footer">
          <span id="auth-footer-text">Don't have an account? <a href="#" id="auth-switch-link">Register here</a></span>
        </div>

      </div>

    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>

  <!-- Footer link switches tabs -->
  <script>
    document.getElementById('auth-switch-link').addEventListener('click', (e) => {
      e.preventDefault();
      const loginTab = document.getElementById('tab-login');
      const registerTab = document.getElementById('tab-register');
      const footerText = document.getElementById('auth-footer-text');
      const link = document.getElementById('auth-switch-link');

      if (registerTab.classList.contains('active')) {
        loginTab.click();
        footerText.innerHTML = 'Don\'t have an account? <a href="#" id="auth-switch-link">Register here</a>';
      } else {
        registerTab.click();
        footerText.innerHTML = 'Already have an account? <a href="#" id="auth-switch-link">Sign in</a>';
      }

      // Re-attach event listener to the new link
      document.getElementById('auth-switch-link').addEventListener('click', arguments.callee.bind(null, e));
    });
  </script>

</body>
</html>
