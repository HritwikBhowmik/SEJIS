<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SEJIS AI Interview — Interview complete! Submit and download your performance report.">
  <title>Interview Complete — SEJIS</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/interview.css">
</head>
<body class="interview-page">

  <!-- ========== HEADER ========== -->
  <header class="interview-header">
    <div class="interview-header-inner">
      <a href="dashboard.html" class="interview-brand">
        <div class="interview-brand-icon">S</div>
        <span>SEJIS Interview</span>
      </a>
      <a href="dashboard.html" class="btn btn-ghost btn-sm">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Dashboard
      </a>
    </div>
  </header>

  <!-- ========== PROGRESS BAR ========== -->
  <div class="progress-bar-container">
    <div class="progress-bar-inner">
      <div class="progress-steps">
        <div class="progress-step completed">
          <div class="progress-step-circle">1</div>
          <span class="progress-step-label">Resume</span>
        </div>
        <div class="progress-step completed">
          <div class="progress-step-circle">2</div>
          <span class="progress-step-label">Intro</span>
        </div>
        <div class="progress-step completed">
          <div class="progress-step-circle">3</div>
          <span class="progress-step-label">DSA</span>
        </div>
        <div class="progress-step completed">
          <div class="progress-step-circle">4</div>
          <span class="progress-step-label">System Design</span>
        </div>
        <div class="progress-step completed">
          <div class="progress-step-circle">5</div>
          <span class="progress-step-label">Final</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="interview-content">

    <!-- Phase 5: Completion -->
    <div class="phase-section active" id="phase-complete">
      <div class="phase-card">
        <div class="phase-card-body">
          <div class="completion-section">
            <div class="completion-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            <h2>Interview Complete!</h2>
            <p>Great job! All four phases have been completed. Submit your interview to save your scores and generate your performance report.</p>

            <div class="mb-6">
              <span class="text-muted">Your Total Score:</span>
              <div style="font-size: 2rem; font-weight: 800; color: var(--color-primary-700); margin-top: 4px;" id="final-total-score">—</div>
            </div>

            <div class="completion-actions">
              <button class="btn btn-success btn-lg" id="submit-interview-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                Submit Interview
              </button>
              <button class="btn btn-primary btn-lg hidden" id="download-report-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download Report
              </button>
              <a href="dashboard.html" class="btn btn-outline btn-lg hidden" id="back-to-dashboard-btn">
                Back to Dashboard
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

  </main>

  <script src="js/api.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/interview.js"></script>

</body>
</html>
