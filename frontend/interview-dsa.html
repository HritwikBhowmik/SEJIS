<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SEJIS AI Interview — Data Structures & Algorithms coding challenge.">
  <title>DSA Challenge — SEJIS Interview</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/interview.css">
</head>
<body class="interview-page">

  <!-- ========== HEADER ========== -->
  <header class="interview-header">
    <div class="interview-header-inner">
      <a href="dashboard.html" class="interview-brand" id="interview-back-btn">
        <div class="interview-brand-icon">S</div>
        <span>SEJIS Interview</span>
      </a>
      <a href="dashboard.html" class="btn btn-ghost btn-sm">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Dashboard
      </a>
    </div>
  </header>

  <!-- ========== PROGRESS BAR ========== -->
  <div class="progress-bar-container">
    <div class="progress-bar-inner">
      <div class="progress-steps">
        <div class="progress-step completed">
          <div class="progress-step-circle">1</div>
          <span class="progress-step-label">Resume</span>
        </div>
        <div class="progress-step completed">
          <div class="progress-step-circle">2</div>
          <span class="progress-step-label">Intro</span>
        </div>
        <div class="progress-step active">
          <div class="progress-step-circle">3</div>
          <span class="progress-step-label">DSA</span>
        </div>
        <div class="progress-step">
          <div class="progress-step-circle">4</div>
          <span class="progress-step-label">System Design</span>
        </div>
        <div class="progress-step">
          <div class="progress-step-circle">5</div>
          <span class="progress-step-label">Final</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="interview-content">

    <!-- Phase 2: DSA -->
    <div class="phase-section active" id="phase-dsa">
      <div class="phase-card">
        <div class="phase-card-header">
          <h3>
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Phase 2 — Data Structures &amp; Algorithms
          </h3>
          <div class="flex items-center gap-3">
            <div class="speaking-indicator hidden" id="dsa-speaking">
              <div class="speaking-bars"><span></span><span></span><span></span><span></span></div>
              Speaking
            </div>
            <div class="timer-display" id="dsa-timer">15:00</div>
          </div>
        </div>
        <div class="phase-card-body">

          <!-- Loading -->
          <div class="phase-loading" id="dsa-loading">
            <div class="spinner spinner-dark"></div>
            Generating DSA question...
          </div>

          <div id="dsa-content" class="hidden">
            <!-- Question -->
            <div class="question-display">
              <div class="question-text" id="dsa-question-text">Loading question...</div>
            </div>

            <!-- Code Editor -->
            <div class="code-editor-container">
              <div class="code-editor-header">
                <div class="code-editor-dots">
                  <span></span><span></span><span></span>
                </div>
                <span class="code-editor-label">solution.py</span>
              </div>
              <textarea class="code-editor" id="dsa-code-editor" placeholder="# Write your code solution here..." spellcheck="false"></textarea>
            </div>

            <div class="phase-actions">
              <button class="btn btn-primary btn-lg" id="dsa-submit-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                Submit Code
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

  </main>

  <script src="js/api.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/interview.js"></script>

</body>
</html>
